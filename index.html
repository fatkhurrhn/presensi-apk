    <script>
        // Update link download dengan URL APK dari GitHub Release
        // Ganti '#' dengan link APK mu setelah upload ke GitHub Release
        const downloadBtns = document.querySelectorAll('#download a, .hero .btn-primary');
        const apkUrl = 'https://github.com/fatkhurrhn/presensi-apk/releases/download/v1.0.0/app-release.apk'; // <-- Ganti dengan link APK (contoh: https://github.com/username/repo/releases/download/v1.0.0/app-release.apk)

        downloadBtns.forEach(btn => {
            if (btn.getAttribute('href') === '#' || btn.getAttribute('href') === '#download') {
                btn.setAttribute('href', apkUrl);
            }
            btn.setAttribute('download', '');
        });

        // Smooth scroll
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                const href = this.getAttribute('href');
                if (href === '#' || href === '#download') return;
                e.preventDefault();
                const target = document.querySelector(this.getAttribute('href'));
                if (target) {
                    target.scrollIntoView({ behavior: 'smooth', block: 'start' });
                }
            });
        });
    </script>
