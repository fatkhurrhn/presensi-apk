<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>PresensiApps - Aplikasi Presensi Petani untuk Mandor</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome 6 -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <style>
        .btn-primary {
            background-color: #2C6E49;
            transition: all 0.2s ease;
        }

        .btn-primary:hover {
            background-color: #1F5235;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(44, 110, 73, 0.4);
        }

        .btn-outline {
            border: 1px solid #2C6E49;
            transition: all 0.2s ease;
        }

        .btn-outline:hover {
            background-color: #2C6E49;
            color: white;
            transform: translateY(-2px);
        }

        @keyframes float {
            0% {
                transform: translateY(0px);
            }

            50% {
                transform: translateY(-10px);
            }

            100% {
                transform: translateY(0px);
            }
        }

        .float-animation {
            animation: float 3s ease-in-out infinite;
        }
    </style>
</head>

<body class="bg-[#F4F9F4] font-sans antialiased">

    <!-- Hero Section Full -->
    <section class="min-h-screen flex items-center justify-center px-4 py-12">
        <div class="container mx-auto max-w-4xl">
            <div class="text-center">
                <!-- Badge -->
                <div
                    class="inline-flex items-center gap-2 bg-[#C8E6D9]/60 backdrop-blur-sm rounded-full px-4 py-1.5 mb-5">
                    <span class="text-[#1F5235] text-xs font-semibold tracking-wide">Solusi Digital untuk Mandor</span>
                </div>

                <!-- Main Heading -->
                <h1 class="text-3xl md:text-5xl font-extrabold leading-tight text-[#1F5235] mb-4">
                    Presensi Kegiatan
                    <span class="text-[#4C9A6F] relative inline-block">
                        Petani
                    </span>
                    <br>Lebih Mudah & Akurat
                </h1>

                <!-- Description -->
                <p class="text-base md:text-lg text-[#4B5563] max-w-2xl mx-auto mb-7 leading-relaxed">
                    Pantau absensi, lokasi, dan aktivitas harian petani secara real-time.
                    Tingkatkan produktivitas tim lapanganmu dengan satu aplikasi.
                </p>

                <!-- CTA Buttons -->
                <div class="flex flex-col sm:flex-row gap-3 justify-center mb-6">
                    <a href="#download"
                        class="btn-primary text-white px-6 py-3 rounded-xl font-semibold inline-flex items-center justify-center gap-2 shadow-lg hover:shadow-xl transition-all text-base">
                        <i class="fab fa-android text-lg"></i>
                        Download APK Sekarang
                        <i class="fas fa-arrow-down text-xs"></i>
                    </a>
                </div>

                <!-- Info Versi -->
                <p class="text-xs text-[#8E9A89] mb-0">
                    <i class="fas fa-tag mr-1"></i> Versi 1.0.0
                    <span class="mx-2">•</span>
                    <i class="fas fa-database mr-1"></i> 60 MB
                    <span class="mx-2">•</span>
                    <i class="fab fa-android mr-1"></i> Android 6.0+
                </p>

            </div>
        </div>
    </section>

    <script>
        // Update link download dengan URL APK dari GitHub Release
        const downloadBtns = document.querySelectorAll('a[href="#download"]');
        const apkUrl = 'https://github.com/fatkhurrhn/presensi-apk/releases/download/v1.0.0/app-release.apk';

        downloadBtns.forEach(btn => {
            btn.setAttribute('href', apkUrl);
            btn.setAttribute('download', '');
        });
    </script>
</body>

</html>
